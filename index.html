<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Картографический редактор для гольфа</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Картографический редактор для гольф‑поля</h1>
    <div class="controls">
      <button id="cut-area" class="btn">Вырезать участок</button>
      <button id="save-png" class="btn">Сохранить как PNG</button>
      <button id="load-image" class="btn">Загрузить карту</button>
    </div>
  </header>
  <main>
    <div id="map"></div>
  </main>
  <div id="temp-export-container" style="position: fixed; top: -9999px; left: -9999px; width: 800px; height: 600px;"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
