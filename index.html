<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Картографический редактор для гольфа</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    .controls { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
    .btn { padding: 10px 20px; border: none; border-radius: 5px; background: #3498db; color: white; cursor: pointer; }
    #map { height: 700px; width: 100%; }
  </style>
</head>
<body>
  <header>
    <h1>Картографический редактор для гольф‑поля</h1>
    <div class="controls">
      <button id="cut-area" class="btn">Вырезать участок (2 клика)</button>
      <button id="save-png" class="btn" disabled>Сохранить как PNG</button>
    </div>
  </header>
  <main>
    <div id="map"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    let globalRectangle = null;
    let exportMapInstance = null;
    let selectionComplete = false; // Флаг завершения выделения

    function initCutAreaFunctionality(map) {
      const cutAreaBtn = document.getElementById('cut-area');
      const saveBtn = document.getElementById('save-png');
      let isDrawing = false;
      let firstCorner = null;

      cutAreaBtn.addEventListener('click', function() {
        isDrawing = true;
        firstCorner = null;
        selectionComplete = false;
        saveBtn.disabled = true;

        if (globalRectangle) {
          map.removeLayer(globalRectangle);
          globalRectangle = null;
        }

        cutAreaBtn.textContent = 'Кликните 1‑й угол → 2‑й угол';
        alert('Кликните на карте для установки первого угла прямоугольника');
      });

      map.on('click', function(e) {
        if (!isDrawing) return;

        if (!firstCorner) {
          firstCorner = e.latlng;
          alert('Теперь кликните для установки второго угла прямоугольника');
          return;
        }

        const secondCorner = e.latlng;

        // Создаём прямоугольник
        globalRectangle = L.rectangle([
          [firstCorner.lat, firstCorner.lng],
          [secondCorner.lat, secondCorner.lng]
        ], {
          color: '#FF0000',
          weight: 3,
          fillOpacity: 0.2
        }).addTo(map);

        isDrawing = false;
        selectionComplete = true;
        saveBtn.disabled = false;
        cutAreaBtn.textContent = 'Вырезать участок (2 клика)';
        alert('Участок выделен! Нажмите "Сохранить как PNG" для скачивания.');
      });
    }

    async function saveMapAsPNG(map) {
      if (!selectionComplete || !globalRectangle) {
        alert('Сначала выделите участок на карте (2 клика)!');
        return;
      }

      const bounds = globalRectangle.getBounds();
      const tempContainer = document.createElement('div');
      tempContainer.style.cssText = 'position: fixed; top: -9999px; left: -9999px; width: 800px; height: 600px;';
      document.body.appendChild(tempContainer);

      try {
        exportMapInstance = L.map(tempContainer, {
          center: bounds.getCenter(),
          zoom: map.getZoom(),
          crs: L.CRS.EPSG3857,
          attributionControl: false,
          zoomControl: false,
          scrollWheelZoom: false,
          dragging: false
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(exportMapInstance);
        exportMapInstance.fitBounds(bounds, { padding: [20, 20] });

        exportMapInstance.once('tileloadcomplete', async function() {
          setTimeout(async function() {
            try {
              exportMapInstance.invalidateSize();
              const canvas = await html2canvas(tempContainer, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff',
                windowWidth: 800,
                windowHeight: 600
              });

              canvas.toBlob((blob) => {
                if (blob) {
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement('a');
                  a.href = url;
                  a.download = `golf-map-${Date.now()}.png`;
                  document.body.appendChild(a);
                  a.click();
                  document.body.removeChild(a);
                  URL.revokeObjectURL(url);
                  console.log('Файл успешно сохранён');
                } else {
                  alert('Не удалось сохранить изображение');
                }
                cleanup();
              }, 'image/png');
            } catch (canvasError) {
              console.error('Ошибка при создании canvas:', canvasError);
              alert('Ошибка при создании изображения: ' + canvasError.message);
              cleanup();
            }
          }, 1000);
        });
      } catch (error) {
        console.error('Ошибка при инициализации временной карты:', error);
        alert('Ошибка при сохранении: ' + error.message);
        cleanup();
      }
    }

    function cleanup() {
      if (exportMapInstance) {
        exportMapInstance.remove();
        exportMapInstance = null;
      }
      const tempContainers = document.querySelectorAll('[style*="top: -9999px"]');
      tempContainers.forEach(el => el.remove());
    }

    document.addEventListener('DOMContentLoaded', function() {
      const map = L.map('map').setView([55.751244, 37.618423], 13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
      }).addTo(map);

      initCutAreaFunctionality(map);
      document.getElementById('save-png').addEventListener('click', () => saveMapAsPNG(map));
    });
  </script>
</body>
</html>
